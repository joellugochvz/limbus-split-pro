# Pipeline de CI para Limbus Split Pro.
name: build-windows

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 LTS
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore LimbusSplitPro.sln

      - name: Build Release
        run: dotnet build LimbusSplitPro.sln -c Release --no-restore

      - name: Unit + integration tests
        shell: pwsh
        run: |
          $output = dotnet test tests/LimbusSplitPro.Tests/LimbusSplitPro.Tests.csproj -c Release 2>&1 | Out-String
          Write-Host $output
          if ($LASTEXITCODE -ne 0) {
            $lines = ($output -split "`r?`n" | Select-Object -Last 50)
            $escaped = ($lines -join "%0A")
            Write-Output "::error::TESTFAIL%0A$escaped"
            exit $LASTEXITCODE
          }

      - name: Ensamblar runtime Python embebido (reproducible, verificado)
        shell: pwsh
        run: |
          try {
            ./runtime/python-embed/Assemble-PythonEmbed.ps1
            $prov = Get-Content ./runtime/python-embed/dist/PROVENANCE.json -Raw
            $oneline = ($prov -replace "`r?`n", " ")
            Write-Output "::notice::PYTHON_PROVENANCE $oneline"
          } catch {
            $errMsg = $_ | Out-String
            $lines = ($errMsg -split "`r?`n" | Select-Object -Last 40)
            $escaped = ($lines -join "%0A")
            Write-Output "::error::PYEMBED_FAIL%0A$escaped"
            exit 1
          }

      - name: Subir runtime Python embebido como artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-embed-runtime
          path: runtime/python-embed/dist/
          retention-days: 14

      - name: Verificar arquitectura de binarios (x64)
        run: |
          echo "Pendiente: scripts/Verify-BinaryArchitecture.ps1"

      - name: Verificar manifiesto de modelos (fail-closed)
        run: |
          echo "Pendiente: scripts/Verify-ModelManifest.ps1"

      - name: Generar SBOM (CycloneDX)
        run: |
          echo "Pendiente: integracion CycloneDX"

      - name: Publicar build portable (self-contained win-x64)
        run: |
          dotnet publish src/LimbusSplitPro.App/LimbusSplitPro.App.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=false `
            -o publish/LimbusSplitPro
          # Empaquetar el runtime Python y el motor junto al exe para que
          # "Separar y exportar" pueda invocarlos de verdad en la build descargable.
          Copy-Item -Recurse -Force engine-py publish/LimbusSplitPro/engine-py
          New-Item -ItemType Directory -Force -Path publish/LimbusSplitPro/runtime/python-embed | Out-Null
          Copy-Item -Recurse -Force runtime/python-embed/dist publish/LimbusSplitPro/runtime/python-embed/dist

      - name: Subir artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: LimbusSplitPro-dev-build
          path: publish/LimbusSplitPro/
          retention-days: 14

      - name: Construir instalador (WiX v5)
        run: |
          echo "Pendiente: build MSI"

      - name: Firma Authenticode
        if: false
        run: |
          echo "Firma deshabilitada: no hay certificado de firma de codigo disponible."

      - name: Publicar hashes de artefactos
        run: |
          echo "Pendiente: publicacion de checksums SHA-256"
